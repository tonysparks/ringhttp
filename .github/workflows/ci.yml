name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ringhttp
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc \
            liburing-dev \
            libcurl4-openssl-dev \
            ca-certificates

      - name: Clone litac-lang
        run: git clone https://github.com/tonysparks/litac-lang $HOME/litac-lang

      - name: Build litac compiler
        run: |
          cd $HOME/litac-lang
          chmod +x build_bootstrap.sh build.sh
          ./build_bootstrap.sh && ./build.sh
          echo "$HOME/litac-lang/bin" >> $GITHUB_PATH
          echo "LITAC_HOME=$HOME/litac-lang" >> $GITHUB_ENV

      - name: Install litac dependencies
        run: litac install

      - name: Run tests
        run: litac test

      - name: Build h2spec conformance image
        run: docker build --no-cache -f Dockerfile.h2spec -t ring-h2spec .

      - name: Run h2spec RFC 7540 conformance
        run: docker run --rm --security-opt seccomp=unconfined ring-h2spec /app/entrypoint.sh


  test-macos:
    name: Test (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout ringhttp
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install curl

      - name: Clone litac-lang
        run: git clone https://github.com/tonysparks/litac-lang $HOME/litac-lang

      - name: Build litac compiler
        run: |
          cd $HOME/litac-lang
          chmod +x build_bootstrap.sh build.sh
          ./build_bootstrap.sh && ./build.sh
          echo "$HOME/litac-lang/bin" >> $GITHUB_PATH
          echo "LITAC_HOME=$HOME/litac-lang" >> $GITHUB_ENV

      - name: Run tests
        run: litac test
